spring:
  application:
    name: freightflow-api
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
    time-zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  devtools:
    restart:
      enabled: false
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  health:
    rabbit:
      enabled: true
  endpoint:
    health:
      # Em dev mostra detalhes; em prod (railway/prod) usa NEVER para não expor
      # estado de DB, Redis, RabbitMQ sem autenticação.
      show-details: when-authorized
      roles: ACTUATOR_ADMIN

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

freightflow:
  jwt:
    secret: ${JWT_SECRET:freightflow-dev-secret-key-minimum-32-bytes-long!!}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:}
    publishable-key: ${STRIPE_PUBLISHABLE_KEY:}
  cache:
    ais-ttl-minutes: 5
  tracking:
    interval-ms: 300000  # 5 minutes
  storage:
    endpoint: ${STORAGE_ENDPOINT:}
    bucket: ${STORAGE_BUCKET:freightflow-docs}
    access-key-id: ${STORAGE_ACCESS_KEY_ID:}
    secret-access-key: ${STORAGE_SECRET_ACCESS_KEY:}
    public-base-url: ${STORAGE_PUBLIC_BASE_URL:}
  notification:
    from-email: ${NOTIFICATION_FROM_EMAIL:noreply@freightflow.com}
    from-name: "FreightFlow"
  messaging:
    enabled: ${FREIGHTFLOW_MESSAGING_ENABLED:true}

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/freightflow_dev
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        generate_statistics: true
        use_sql_comments: true
  redis:
    host: localhost
    port: 6379
  data:
    redis:
      repositories:
        enabled: false
  rabbitmq:
    host: localhost
    port: 5672
    username: freightflow
    password: freightflow

management:
  health:
    mail:
      enabled: false
    rabbit:
      enabled: false
    redis:
      enabled: false

freightflow:
  cache:
    ais-ttl-minutes: 5
  tracking:
    interval-ms: 300000  # 5 minutes
  messaging:
    enabled: ${FREIGHTFLOW_MESSAGING_ENABLED:false}
  storage:
    endpoint: ${STORAGE_ENDPOINT:}
    bucket: ${STORAGE_BUCKET:freightflow-docs}
    access-key-id: ${STORAGE_ACCESS_KEY_ID:}
    secret-access-key: ${STORAGE_SECRET_ACCESS_KEY:}
    public-base-url: ${STORAGE_PUBLIC_BASE_URL:http://localhost:8080/mock-storage}

logging:
  level:
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:postgresql://localhost:5432/freightflow_test
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  redis:
    host: localhost
    port: 6379
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

freightflow:
  cache:
    ais-ttl-minutes: 1
  tracking:
    interval-ms: 999999999  # effectively never runs in tests
  storage:
    endpoint: ${STORAGE_ENDPOINT:}
    bucket: ${STORAGE_BUCKET:freightflow-docs-test}
    access-key-id: ${STORAGE_ACCESS_KEY_ID:}
    secret-access-key: ${STORAGE_SECRET_ACCESS_KEY:}
    public-base-url: ${STORAGE_PUBLIC_BASE_URL:http://localhost:8080/mock-storage}

---
spring:
  config:
    activate:
      on-profile: railway
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  # Desabilita Redis e RabbitMQ no Railway (adicionar depois se necessario)
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  port: ${PORT:8080}

freightflow:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION:86400000}
  cache:
    ais-ttl-minutes: 5
  tracking:
    interval-ms: 300000  # 5 minutes
  storage:
    endpoint: ${STORAGE_ENDPOINT:}
    bucket: ${STORAGE_BUCKET:freightflow-docs}
    access-key-id: ${STORAGE_ACCESS_KEY_ID:}
    secret-access-key: ${STORAGE_SECRET_ACCESS_KEY:}
    public-base-url: ${STORAGE_PUBLIC_BASE_URL:}
  notification:
    from-email: ${NOTIFICATION_FROM_EMAIL:noreply@freightflow.com}
    from-name: "FreightFlow"

logging:
  level:
    root: INFO
    com.freightflow: INFO
  pattern:
    console: "%d{ISO8601} [%thread] %-5level %logger{36} - %msg%n"

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  redis:
    url: ${REDIS_URL}
  rabbitmq:
    url: ${RABBITMQ_URL}
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

freightflow:
  cache:
    ais-ttl-minutes: 5
  tracking:
    interval-ms: 300000  # 5 minutes
  storage:
    endpoint: ${STORAGE_ENDPOINT:}
    bucket: ${STORAGE_BUCKET:freightflow-docs}
    access-key-id: ${STORAGE_ACCESS_KEY_ID:}
    secret-access-key: ${STORAGE_SECRET_ACCESS_KEY:}
    public-base-url: ${STORAGE_PUBLIC_BASE_URL:}
  notification:
    from-email: ${NOTIFICATION_FROM_EMAIL:noreply@freightflow.com}
    from-name: "FreightFlow"

logging:
  level:
    root: INFO
  pattern:
    console: "%d{ISO8601} [%thread] %-5level %logger{36} - %msg%n"
