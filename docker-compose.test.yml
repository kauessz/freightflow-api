version: '3.9'

# Infra para rodar testes de integração localmente
services:
  postgres-test:
    image: postgres:16-alpine
    container_name: freightflow-postgres-test
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: freightflow_test
      POSTGRES_USER: freightflow
      POSTGRES_PASSWORD: freightflow
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freightflow"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-test:
    image: redis:7-alpine
    container_name: freightflow-redis-test
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
