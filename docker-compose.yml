version: '3.9'

services:
  # ==================== PostgreSQL 16 ====================
  postgres:
    image: postgres:16-alpine
    container_name: freightflow-postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-freightflow_dev}
      POSTGRES_USER: ${DB_USERNAME:-freightflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-freightflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-freightflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Redis 7 ====================
  redis:
    image: redis:7-alpine
    container_name: freightflow-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== RabbitMQ 3.13 ====================
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: freightflow-rabbitmq
    restart: unless-stopped
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-freightflow}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-freightflow}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ==================== FreightFlow API ====================
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: freightflow-api
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-freightflow_dev}
      DB_USERNAME: ${DB_USERNAME:-freightflow}
      DB_PASSWORD: ${DB_PASSWORD:-freightflow}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-freightflow}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-freightflow}
      JWT_SECRET: ${JWT_SECRET:-my-super-secret-jwt-key-for-dev-only-change-in-prod}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
